<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blessing Lookup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <style>
      :root {
        --bg-primary: #d6fdff; /* Main page background */
        --text-primary: #000250; /* Primary text */
        --bg-surface: #f5ffff; /* Card and surface background */
        --border-default: #5c8bb8; /* Default border colour */
        --text-secondary: #001e68; /* Secondary text */
        --text-tertiary: #005eb8; /* Tertiary text */
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        max-width: 560px;
        margin: 40px auto;
        padding: 0 20px;
        color: var(--text-primary);
        background: var(--bg-primary);
      }
      header {
        text-align: center;
        margin-bottom: 1.5rem;
      }
      h1 {
        font-size: 1.3rem;
        margin-bottom: 0.2em;
      }
      .tagline {
        color: var(--text-secondary);
        font-size: 0.9rem;
        margin-top: 0.25rem;
      }
      select {
        width: 100%;
        font-size: 1rem;
        padding: 8px;
        margin: 16px 0;
        box-sizing: border-box;
        text-align: center;
        text-align-last: center;
      }
      #output {
        border: 1px solid var(--border-default);
        border-radius: 6px;
        padding: 16px;
        min-height: 40px;
        background: var(--bg-surface);
      }
      #output p {
        margin: 0 0 8px 0;
        line-height: 1.5;
      }
      #output p:last-child {
        margin-bottom: 0;
      }
      #output p.hebrew {
        font-family: "Frank Ruhl Libre", serif;
        font-size: 2rem;
        font-weight: 500;
      }
      .placeholder {
        color: var(--text-tertiary);
        font-style: italic;
        text-align: center;
        text-align-last: center;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Berakhot</h1>
      <p class="tagline">Blessings to Know by Heart</p>
    </header>
    <main>
      <select id="blessingSelect">
        <option value="">choose a blessing</option>
      </select>

      <div id="output">
        <p class="placeholder">Select a blessing above to see its text.</p>
      </div>
    </main>
    <script>
      const select = document.getElementById("blessingSelect");
      const output = document.getElementById("output");

      // Fetch the JSON file and use it to populate the dropdown
      fetch("blessings.json")
        .then((response) => response.json())
        .then((data) => {
          data.forEach((item, index) => {
            const option = document.createElement("option");
            option.value = index; // store the array index as the value
            option.textContent = item.name;
            select.appendChild(option);
          });

          // When the user picks an option, look up that item and display its text
          select.addEventListener("change", () => {
            if (select.value === "") {
              output.innerHTML =
                '<p class="placeholder">Select a blessing above to see its text.</p>';
              return;
            }
            const chosen = data[select.value];
            output.innerHTML = "";
            // Split on newlines so Hebrew / transliteration / translation each get their own line
            chosen.blessingText.split("\n").forEach((line) => {
              const p = document.createElement("p");
              const isHebrew = /[\u0590-\u05FF]/.test(line);
              if (isHebrew) {
                p.classList.add("hebrew");
                p.setAttribute("lang", "he");
                p.setAttribute("dir", "rtl");
              } else {
                p.setAttribute("lang", "en");
                p.setAttribute("dir", "ltr");
              }
              p.textContent = line;
              output.appendChild(p);
            });
          });
        })
        .catch((err) => {
          output.innerHTML =
            '<p class="placeholder">Could not load blessings.json — see note below.</p>';
          console.error(err);
        });
    </script>
  </body>
</html>
